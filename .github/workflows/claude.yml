name: Claude Code (Remote)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-remote:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Build prompt from event
        id: prompt
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            BODY="${{ github.event.comment.body }}"
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            BODY="${{ github.event.comment.body }}"
          elif [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            BODY="${{ github.event.review.body }}"
          elif [[ "${{ github.event_name }}" == "issues" ]]; then
            BODY="${{ github.event.issue.title }} — ${{ github.event.issue.body }}"
          fi
          # Remove @claude mention from the prompt
          PROMPT=$(echo "$BODY" | sed 's/@claude//g' | xargs)
          echo "prompt<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Launch Claude --remote
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "::group::Launching Claude remote session"
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "Prompt: ${{ steps.prompt.outputs.prompt }}"

          # Launch Claude in remote mode — returns immediately with a session ID
          # Claude continues working in Anthropic's cloud
          claude --remote \
            -p "${{ steps.prompt.outputs.prompt }}" \
            2>&1 | tee /tmp/claude-output.log

          echo "::endgroup::"

          # Log session info for traceability
          echo "## Claude Remote Session" >> "$GITHUB_STEP_SUMMARY"
          echo "Claude is working on this task in the cloud." >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress at https://claude.ai/code" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Event:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Prompt:** ${{ steps.prompt.outputs.prompt }}" >> "$GITHUB_STEP_SUMMARY"
